name: Java CI with Gradle

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v3

      - name: Start containers
        uses: hoverkraft-tech/compose-action@v2
        with:
          compose-file: docker-compose.yml


      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            docker exec $(docker ps -qf "ancestor=mysql:8.0.41") \
              mysqladmin ping -h 127.0.0.1 -uapp -ppass --silent && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Start SUT
        run: |
          java \
            -Ddb.url=jdbc:mysql://localhost:3306/app \
            -Ddb.user=app \
            -Ddb.password=pass \
            -jar ./artifacts/app-deadline.jar > sut.log 2>&1 &

      - name: Wait for SUT
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 9999 && echo "SUT is up" && break
            echo "Waiting for SUT..."
            sleep 2
          done

      - name: Run tests
        run: ./gradlew test --info -Dselenide.headless=true

      - name: Print SUT log if failed
        if: failure()
        run: cat sut.log